[build]
  command = "npm run build"
  publish = "web/dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # ort-web loads its wasm backend in two stages: a dynamic import of the
  # .mjs Emscripten glue, which then instantiates the .wasm. esbuild cannot
  # trace the dynamic import, so both files must be shipped explicitly.
  included_files = [
    "node_modules/onnxruntime-web/dist/ort-wasm-simd-threaded.mjs",
    "node_modules/onnxruntime-web/dist/ort-wasm-simd-threaded.wasm",
  ]
