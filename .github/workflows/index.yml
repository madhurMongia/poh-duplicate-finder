name: Index

on:
  schedule:
    - cron: '13,43 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: "'update' (incremental) or 'bootstrap' (full rebuild)"
        required: false
        default: 'update'

concurrency:
  group: indexer
  cancel-in-progress: false

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run models:download
      - run: npm run build -w core
      - run: npm run indexer -- ${{ github.event.inputs.mode || 'update' }}
        env:
          # npm workspace scripts run with cwd=indexer/, but models:download
          # writes to the repo root — pass an absolute path so both agree.
          MODELS_DIR: ${{ github.workspace }}/models
          MAINNET_SUBGRAPH_URL: ${{ secrets.MAINNET_SUBGRAPH_URL }}
          GNOSIS_SUBGRAPH_URL: ${{ secrets.GNOSIS_SUBGRAPH_URL }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
